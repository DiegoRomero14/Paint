<article class="drawing-card">
    <a href="{{ image_url }}" target="_blank" rel="noreferrer">
        <img class="drawing-preview" src="{{ image_url }}" alt="{{ name }}">
        <div class="drawing-meta">
            <h3>{{ name }}</h3>
            <p>{{ created_at }}</p>
            <span>{{ size }}</span>
        </div>
    </a>
</article>
